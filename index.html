<!DOCTYPE html>
<html>

<head>
<title>Do Not Click</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    margin-top:100px;
}

button{
    padding:20px;
    font-size:25px;
    background:red;
    color:white;
    border:none;
    cursor:pointer;
}

#message{
    margin-top:30px;
    font-size:28px;
}

</style>
</head>

<body>

<h1>Welcome</h1>
<p>Whatever you do...</p>

<button id="dangerButton" onclick="clicked()">DO NOT CLICK</button>

<div id="message"></div>

<script>

let count = 0;

function clicked(){

count++;

let message = "";

if(count == 1){
message = "Why would you click that?";
}

else if(count == 2){
message = "Seriously. Stop.";
}

else if(count == 3){
message = "Okay now I'm annoyed.";
document.body.style.background = "purple";
}

else if(count == 4){
message = "Now the button moves.";
moveButton();
}

else if(count == 5){
message = "YOU BROKE THE WEBSITE";
for(let i=0;i<10;i++){
createButton();
}
}

document.getElementById("message").innerText = message;

}

function moveButton(){

let btn = document.getElementById("dangerButton");

btn.style.position = "absolute";
btn.style.left = Math.random()*500 + "px";
btn.style.top = Math.random()*400 + "px";

}

function createButton(){

let btn = document.createElement("button");
btn.innerText = "WHY";
btn.style.margin = "5px";

document.body.appendChild(btn);

}

</script>

</body>
</html>
